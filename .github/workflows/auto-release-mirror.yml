name: Mirror Upstream Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1️⃣ 获取 upstream 最新 release
      - name: Get upstream release
        id: upstream
        run: |
          TAG=$(curl -s https://api.github.com/repos/bggRGjQaUbCoE/PiliPlus/releases/latest | jq -r .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # 2️⃣ 读取你仓库上一次同步的 tag
      - name: Get last synced tag
        id: local
        run: |
          LAST=$(git tag -l "sync-*" | sort -V | tail -n 1 | sed 's/sync-//')
          echo "last=$LAST" >> $GITHUB_OUTPUT

      # 3️⃣ 判断是否需要更新
      - name: Check if new release
        id: check
        run: |
          if [ "${{ steps.upstream.outputs.tag }}" != "${{ steps.local.outputs.last }}" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
          else
            echo "update=false" >> $GITHUB_OUTPUT
          fi

      # 4️⃣ 同步 upstream + 更新 custom
      - name: Sync and update custom
        if: steps.check.outputs.update == 'true'
        run: |
          git remote add upstream https://github.com/bggRGjQaUbCoE/PiliPlus.git || true
          git fetch upstream

          # 更新 main
          git checkout main
          git merge upstream/main
          git push origin main

          # 更新 custom
          git checkout custom || git checkout -b custom
          git rebase main
          git push --force-with-lease

      # 5️⃣ 记录已同步的 release
      - name: Mark synced tag
        if: steps.check.outputs.update == 'true'
        run: |
          git tag sync-${{ steps.upstream.outputs.tag }}
          git push origin sync-${{ steps.upstream.outputs.tag }}
