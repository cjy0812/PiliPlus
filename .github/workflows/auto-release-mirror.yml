name: Mirror Upstream Release & Build My Own

on:
  schedule:
    - cron: '0 0 * * *'      
  workflow_dispatch:         # 允许手动触发

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 先把上游最新代码同步到 main（复用你已有的 sync 逻辑）
      - uses: kuma0128/sync-upstream-action@v1
        with:
          upstream_repo: 'bggRGjQaUbCoE/PiliPlus'
          upstream_branch: 'main'
          target_branch: 'custom'
          mode: 'direct'
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 获取上游最新 release
      - name: Get latest upstream release
        id: upstream
        run: |
          UPSTREAM_LATEST=$(curl -s https://api.github.com/repos/原作者/原仓库/releases/latest | jq -r .tag_name)
          echo "upstream_tag=$UPSTREAM_LATEST" >> $GITHUB_OUTPUT
          echo "上游最新版本: $UPSTREAM_LATEST"

      # 3. 如果你本地还没有这个 tag，就打 tag 并推送（会触发你的 release 构建）
      - name: Create same tag locally and push
        if: steps.upstream.outputs.upstream_tag != ''
        run: |
          if ! git tag | grep -q "^${{ steps.upstream.outputs.upstream_tag }}$"; then
            git tag ${{ steps.upstream.outputs.upstream_tag }}
            git push origin ${{ steps.upstream.outputs.upstream_tag }}
            echo "✅ 已创建 tag ${{ steps.upstream.outputs.upstream_tag }}，将自动触发构建"
          else
            echo "已存在该 tag，跳过"
          fi
          
      - name: Rebase custom branch
        run: |
             git checkout custom
             git rebase main
             git push --force-with-lease
             git tag my-v${{ steps.upstream.outputs.upstream_tag }}  # 自定义 tag 名
             git push origin my-v${{ steps.upstream.outputs.upstream_tag }}
