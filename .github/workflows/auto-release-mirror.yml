name: Mirror Upstream Release & Build My Own

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 手动同步 upstream → main
      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/bggRGjQaUbCoE/PiliPlus.git || true
          git fetch upstream
          git checkout main
          git merge upstream/main
          git push origin main

      # 更新 custom 分支（你的魔改分支）
      - name: Rebase custom branch
        run: |
          git checkout custom || git checkout -b custom
          git rebase main
          git push --force-with-lease

      # 获取上游最新 release
      - name: Get latest upstream release
        id: upstream
        run: |
          UPSTREAM_LATEST=$(curl -s https://api.github.com/repos/bggRGjQaUbCoE/PiliPlus/releases/latest | jq -r .tag_name)
          echo "upstream_tag=$UPSTREAM_LATEST" >> $GITHUB_OUTPUT
          echo "上游最新版本: $UPSTREAM_LATEST"

      # 打 tag（基于最新 custom HEAD）
      - name: Create tag and push
        if: steps.upstream.outputs.upstream_tag != ''
        run: |
          TAG="my-v${{ steps.upstream.outputs.upstream_tag }}"
          if ! git tag | grep -q "^$TAG$"; then
            git tag $TAG
            git push origin $TAG
            echo "✅ 已创建 tag $TAG"
          else
            echo "tag 已存在，跳过"
          fi
